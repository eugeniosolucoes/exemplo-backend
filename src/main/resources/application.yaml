server:
  error:
    include-message: always
    include-stacktrace: never  
  servlet:
    contextPath: /api
spring:
  application:
    name: exemplo-backend
    
  datasource:
    # Database Connection Settings
#    url: jdbc:mysql://localhost:3306/vitorhugo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#    username: root
#    password: pwd
#    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:h2:mem:db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa    
  sql:
    init:
        mode: always

    # HikariCP Connection Pool Optimization
#    hikari:
#      maximum-pool-size: 10
#      minimum-idle: 5
#      idle-timeout: 30000
#      connection-timeout: 20000
#      max-lifetime: 1800000
#      pool-name: MySqlHikariCP

  # SQL Logging (Useful for debugging queries)
  # Spring Data JDBC uses standard NamedParameterJdbcTemplate under the hood
logging:
  level:
    org.springframework.jdbc.core.NamedParameterJdbcTemplate: DEBUG
    org.springframework.jdbc.datasource.DataSourceTransactionManager: DEBUG
